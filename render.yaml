# Render Blueprint — one web service that serves both the API and the built
# frontend. Create your Postgres database on Neon (https://neon.tech) and set
# DATABASE_URL in the Render dashboard when prompted.
#
# Deploy: push this repo to GitHub → Render dashboard → New → Blueprint.
#
# NOTE (free plan): the service spins down after ~15 min of inactivity (first
# request then takes ~50s). Also, local disk is wiped on every redeploy, so
# admin-panel uploads (product/category photos, banners) would be lost —
# set CLOUDINARY_CLOUD_NAME/CLOUDINARY_API_KEY/CLOUDINARY_API_SECRET (free
# tier at https://cloudinary.com) to store them there instead; without those,
# uploads fall back to local disk (fine for local dev, not for production).
# The two seeded hero videos always survive either way since they ship in
# the repo. Alternatively, upgrade to the "starter" plan and uncomment the
# disk + UPLOADS_DIR lines below for a persistent local disk instead.
services:
  - type: web
    name: yamuna-organics
    runtime: node
    plan: free
    # NODE_ENV=production (set below) makes npm skip devDependencies by default,
    # which would drop vite (needed to build the frontend) — force it back on
    # for that one install with --include=dev.
    buildCommand: cd frontend && npm ci --include=dev && npm run build && cd ../backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL # paste your Neon connection string
        sync: false
      - key: ADMIN_PHONE # phone number that gets admin access via OTP login
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # - key: UPLOADS_DIR
      #   value: /var/data/uploads
    # disk:               # persistent storage for admin uploads (paid plans)
    #   name: uploads
    #   mountPath: /var/data/uploads
    #   sizeGB: 2
