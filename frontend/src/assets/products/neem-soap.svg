      <stop offset="0%" stop-color="#8db877"/>
      <stop offset="55%" stop-color="#6e9e58"/>
      <stop offset="100%" stop-color="#557f42"/>
    </linearGradient>
    <linearGradient id="nsGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b5811f"/>
      <stop offset="50%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#b5811f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#f4eedd"/>
  <circle cx="330" cy="70" r="90" fill="#e9dfc2" opacity="0.6"/>
  <circle cx="60" cy="340" r="70" fill="#e9dfc2" opacity="0.6"/>
  <!-- leaves behind -->
  <g fill="#4a7a38" opacity="0.9">
    <path d="M 95 130 C 70 105, 70 70, 98 50 C 118 78, 116 110, 95 130 Z"/>
    <path d="M 310 300 C 338 280, 342 246, 322 222 C 298 244, 296 278, 310 300 Z"/>
  </g>
  <!-- soap bar with soft shadow -->
  <ellipse cx="200" cy="292" rx="128" ry="18" fill="#c9bd98" opacity="0.55"/>
  <rect x="82" y="140" width="236" height="140" rx="26" fill="url(#nsBar)"/>
  <rect x="82" y="140" width="236" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
  <!-- wrap band -->
  <rect x="150" y="128" width="100" height="164" fill="#fbf6e8"/>
  <rect x="150" y="128" width="100" height="164" fill="none" stroke="#dccf9f" stroke-width="1.5"/>
