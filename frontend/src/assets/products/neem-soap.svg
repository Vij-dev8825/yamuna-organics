  <text x="200" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" letter-spacing="3" fill="#8a5a1e">ORGANIC</text>
  <rect x="166" y="218" width="68" height="1.6" fill="url(#nsGold)"/>
  <text x="200" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#3c6b2c">NEEM · TULSI</text>
  <text x="200" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#7d7460">HANDMADE SOAP</text>
